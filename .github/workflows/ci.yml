jobs:
  run-test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: checkout Corregido
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test
